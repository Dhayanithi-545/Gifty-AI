services:
  - type: web
    name: gift-recommender-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gift-recommender-db
          property: connectionString
    autoDeploy: true

databases:
  - name: gift-recommender-db
    databaseName: gift_recommender
    user: gift_user
